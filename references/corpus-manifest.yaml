# SPDX-License-Identifier: CC-BY-4.0
#
# The Tier A corpus manifest.
#
# Digests are of each item's ANALYTIC render, quantised to 16 bits, not of any
# file. No rendered media is shipped: each item is reproducible from the
# parameters in corpus.catalogue(), and the digest is what makes that
# reproducibility checkable.
#
# WHY THIS IS SHIPPED RATHER THAN RECOMPUTED
#
# An expectation recomputed from the installed library at test time cannot detect
# a change in the installed library. colour-science supplies the spectra, the
# observer, and the colour space definitions this corpus is built from. Were any
# of those to change in a future release, a recomputing corpus would quietly
# agree with the new values and every downstream number would move with no test
# failing. tests/test_corpus.py recomputes these digests and compares, so a
# dependency change surfaces as a failure naming the item.
#
# Regenerate with:  .venv/bin/python tools/write_corpus_manifest.py

# SPDX-License-Identifier: CC-BY-4.0
#
# The citation ledger.
#
# Every [S:], [M:], and [C:] evidence tag used anywhere in references/ must be
# accounted for here, either as a verified `citations` entry or as a named entry
# in `pending_backfill`. tests/test_citations.py enforces that, offline. The
# online companion, tools/verify_citations.py, re-checks every DOI locator
# against its registrar and is run by hand.
#
# WHY A LEDGER AND NOT A URL LIST
#
# The previous verification record for this project was a list of URLs and their
# HTTP status codes. Auditing the v2 research sweep on 2026-07-23 showed that is
# not sufficient. Of eighteen supplied DOIs, six were wrong, and five of those
# six RESOLVED CLEANLY to a real record that was a different paper. Publisher DOI
# suffixes are near-sequential, so a single corrupted digit lands on a neighbour
# in the same journal. Concretely:
#
#   supplied 10.1002/col.5080200106 -> real, but Rich 1995 on observer metamerism,
#            claimed to be Hung and Berns on constant hue loci, which is ...506
#   supplied 10.1002/col.10049      -> real, but Barnard 2002 on a colour data set,
#            claimed to be the CIEDE2000 development paper, which is col.1049
#   supplied 10.1145/237170.237275  -> real, but Nishimura 1996 "VC-1",
#            claimed to be Smith and Blinn "Blue screen matting", which is ...263
#
# A status-code check passes all three. Comparing the registrar's title against
# the claimed title catches all three. That is the method this ledger records.
#
# VOCABULARY
#
# verification.method
#   registrar_metadata  A DOI registrar (Crossref or DataCite) returned metadata
#                       whose title matches the claimed title. Strongest automated
#                       check available and the only one that catches near-miss DOIs.
#   publisher_landing   The publisher's own identifier-encoded catalogue page
#                       returned HTTP 200. Confirms the identifier exists in that
#                       publisher's catalogue. Does NOT confirm document content.
#   repository_anchor   The claim is pinned to numeric vectors stored in this
#                       repository and re-checked by the test suite on every run.
#   unverified          Not yet checked. Such entries belong in pending_backfill.
#
# verification.claim_depth
#   identifier_only     We confirmed the document exists and is the one named. We
#                       have NOT confirmed it states the specific claim made in the
#                       reference text. Prose citing such an entry must not put
#                       words in the document's mouth.
#   content_checked     The relevant passage was read and the claim matches it.
#
# No entry in this file is content_checked yet. That is a deliberate, visible gap:
# identifier verification was done first because it is the check that catches
# fabrication, and content verification follows per claim as the reference prose
# is written.

schema: colorist/citations/v1

# Tags that are the documentation of the tagging scheme itself, not citations.
# The enforcing test ignores exactly these and nothing else.
legend_tags:
  - "S: ..."
  - "S: standard"
  - "M: ..."
  - "M: manufacturer document, with anchors in tests/vectors/"
  - "C: ..."
  - "C: named craft source"


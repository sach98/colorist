      here despite being open access. Its Crossref abstract states the chart
      "comprises 30 colored patches, divided into three groups: preferred memory
      colors, reference color-gamut colors, and a gray scale".

      OPEN AND LOAD BEARING: whether the four skin patches sit in the preferred

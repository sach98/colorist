pending_backfill:

  - tag: "S: SMPTE RP 431-2, identifier-cited"
    reason: >
      The SMPTE catalogue is served through IEEE Xplore, which answered the
      identifier query with HTTP 202 rather than a document. 202 is not evidence
      the identifier exists, so this is recorded as unverified rather than passed.

